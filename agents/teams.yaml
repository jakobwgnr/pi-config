worker-only:
  - agent: worker
    name: Worker
    consult-when: Implementation, todos, code changes, tests, commits, shipping scoped work
    color: "#10b981"

small-team:
  - agent: planner
    name: Planner
    consult-when: Requirements, brainstorming, design validation, plans, todos, scoping before build
    sequence: 1
    color: "#6366f1"
  - agent: scout
    name: Scout
    consult-when: Codebase reconnaissance, where code lives, context for other agents, fast exploration
    sequence: 1
    color: "#818cf8"
  - agent: worker
    name: Worker
    consult-when: Implementation from todos, coding, running tests, polished commits
    sequence: 2
    color: "#22c55e"
  - agent: reviewer
    name: Reviewer
    consult-when: Code review, quality, security, correctness, change validation
    sequence: 3
    color: "#a78bfa"

dmi-mapping-team:
  - agent: data-mapping-manager
    name: Mapping manager
    consult-when: Coordinating migration mapping, evidence-based decisions, routing source/target/mapping specialists, synthesis
    sequence: 1
    color: "#3b82f6"
  - agent: source-system-specialist
    name: Source specialist
    consult-when: Source schemas, entities, relationships, legacy data quality, ADAMMS source evidence
    sequence: 2
    color: "#14b8a6"
  - agent: target-system-specialist
    name: Target specialist
    consult-when: Target data model, constraints, migration-ready rules, destination semantics, ADAMMS target evidence
    sequence: 3
    color: "#8b5cf6"
  - agent: data-mapping-specialist
    name: Mapping specialist
    consult-when: ADAMMS mapping rules, transformations, selection rules, coverage, rule quality
    sequence: 4
    color: "#0ea5e9"

dmi-development-team:
  - agent: etl-designer
    name: ETL designer
    consult-when: ETL design from ADAMMS rules, mapping readiness, execution plans before implementation, adamms-cli evidence
    sequence: 1
    color: "#38bdf8"
  - agent: scout
    name: Scout
    consult-when: Repo layout, Rogue/ETL structure, quick exploration before design or implementation
    sequence: 1
    color: "#22d3ee"
  - agent: etl-developer
    name: ETL developer
    consult-when: ETL implementation, Rogue jobs and templates, pipelines, approved mapping definitions
    sequence: 2
    color: "#4ade80"
  - agent: reviewer
    name: Reviewer
    consult-when: Review of ETL and migration code, quality, security, correctness
    sequence: 3
    color: "#c084fc"
